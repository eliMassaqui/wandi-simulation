<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <title>Wandi Simulation Studio</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <style>
    :root {
      --panel-height: 220px;
      --glass-bg: rgba(255, 255, 255, 0.8);
      --output-bg: #f5f5f7;
      --accent: #1e90ff;
      --text: #1d1d1f;
      --green-led: #2ed573;
    }
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', system-ui, sans-serif; background: #1a1a1a; }
    canvas { position: fixed; top: 0; left: 0; z-index: 1; }

    #serial-panel {
      position: fixed; bottom: 0; left: 0; width: 100%; height: var(--panel-height);
      background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
      border-top: 1px solid rgba(0,0,0,0.1); z-index: 100; display: flex;
    }
    .panel-section { padding: 16px; display: flex; flex-direction: column; gap: 12px; border-right: 1px solid rgba(0,0,0,0.05); }
    .controls-area { width: 250px; min-width: 250px; }
    .header { display: flex; justify-content: space-between; align-items: center; }
    .status-badge { display: flex; align-items: center; gap: 5px; padding: 3px 8px; background: rgba(0,0,0,0.05); border-radius: 12px; font-size: 10px; font-weight: 700; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ff4757; }
    .dot.connected { background: var(--green-led); box-shadow: 0 0 10px var(--green-led); animation: pulse-green 2s infinite; }
    @keyframes pulse-green { 0% { transform: scale(1); } 70% { transform: scale(1.1); } 100% { transform: scale(1); } }
    .output-container { flex: 1; background: var(--output-bg); margin: 12px; border-radius: 10px; overflow: hidden; display: flex; flex-direction: column; }
    #serial-log { flex: 1; padding: 12px; font-family: monospace; font-size: 11px; overflow-y: auto; }
    .input-group { display: flex; gap: 6px; margin-top: auto; }
    input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
    #btn-send { width: 45px; background: #2f3542; color: white; border: none; border-radius: 8px; cursor: pointer; }
  </style>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <div id="serial-panel">
    <div class="panel-section controls-area">
      <div class="header">
        <h3 style="margin:0; font-size:14px;">Hardware</h3>
        <div class="status-badge">
          <div id="status-dot" class="dot"></div>
          <span id="status-text">OFFLINE</span>
        </div>
      </div>
      <div class="input-group">
        <input type="text" id="serial-input" placeholder="Comando..." />
        <button id="btn-send"><span class="material-symbols-rounded">send</span></button>
      </div>
    </div>
    <div class="output-container">
      <div id="serial-log">Aguardando ponte...</div>
    </div>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
